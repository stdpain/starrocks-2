# CI - Clang Format Check
#
# This workflow runs clang-format-15 on every C/C++ file changed in a pull
# request (against the PR base branch). It does NOT modify the repository;
# it only checks formatting and reports violations.
#
# If formatting issues are found the job fails and a patch file is uploaded
# as a workflow artifact.  Developers can download "clang-format-patch" and
# apply it locally with:
#
#   git apply clang-format.patch
#
# To run the same check locally before opening a PR:
#
#   # Check-only (no modifications):
#   CLANG_FORMAT_BINARY=clang-format-15 bash build-support/clang-format-changed-check.sh
#
#   # Auto-fix changed files in place:
#   CLANG_FORMAT_BINARY=clang-format-15 bash build-support/clang-format-changed.sh

name: CI - Clang Format Check

on:
  pull_request:
    # Only trigger when backend C/C++ source files are touched.
    paths:
      - 'be/src/**'
      - 'be/test/**'

permissions:
  contents: read

jobs:
  clang-format:
    name: Clang-Format
    runs-on: ubuntu-22.04
    env:
      # The local ref name expected by build-support/clang-format-changed-check.sh.
      # We map the actual PR base branch to this name so the script works
      # regardless of whether the target branch is literally called "main".
      FORMAT_BASE_REF: refs/remotes/origin/main

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up base branch reference
        # build-support/clang-format-changed-check.sh computes the changed-file
        # list via "git diff origin/main...HEAD".  Map the actual PR base branch
        # to that well-known ref name so the script works for any target branch.
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "${BASE_REF}:${FORMAT_BASE_REF}" --update-head-ok

      - name: Install clang-format-15
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-format-15

      - name: Run clang-format check on changed C++ files
        # Uses the existing build-support/clang-format-changed-check.sh script
        # which diffs against origin/main and runs clang-format -style=file on
        # every changed C/C++ file found under be/src and be/test.
        id: check
        env:
          CLANG_FORMAT_BINARY: /usr/bin/clang-format-15
        run: bash build-support/clang-format-changed-check.sh

      - name: Generate formatting patch
        # Runs only when the check step above fails so developers get a patch
        # they can apply directly with: git apply clang-format.patch
        if: failure()
        env:
          CLANG_FORMAT_BINARY: /usr/bin/clang-format-15
        run: |
          EXCLUDES="${GITHUB_WORKSPACE}/build-support/excludes"
          SOURCE_DIRS="${GITHUB_WORKSPACE}/be/src,${GITHUB_WORKSPACE}/be/test"

          changed_files=$(
            git diff --name-only --diff-filter=ACMR "${FORMAT_BASE_REF}...HEAD"
          )
          if [[ -z "${changed_files}" ]]; then
            echo "No changed files found – skipping patch generation."
            exit 0
          fi

          tmpfile=$(mktemp)
          python3 build-support/format_changed_files.py \
            --repo_root "${GITHUB_WORKSPACE}" \
            --exclude_globs "${EXCLUDES}" \
            --source_dirs "${SOURCE_DIRS}" \
            --null < <(printf '%s\n' "${changed_files}") > "${tmpfile}"

          if [[ ! -s "${tmpfile}" ]]; then
            echo "No changed C++ files to format – skipping patch generation."
            rm -f "${tmpfile}"
            exit 0
          fi

          # Apply clang-format in place so that git diff produces an
          # applicable unified patch.
          while IFS= read -r -d '' f; do
            "${CLANG_FORMAT_BINARY}" -style=file -i "${f}"
          done < "${tmpfile}"
          rm -f "${tmpfile}"

          git diff > clang-format.patch
          if [[ -s clang-format.patch ]]; then
            echo "Patch written to clang-format.patch"
            echo "Apply with: git apply clang-format.patch"
          else
            echo "Patch is empty – no formatting differences to record."
          fi

      - name: Upload formatting patch artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clang-format-patch
          path: clang-format.patch
          if-no-files-found: ignore
